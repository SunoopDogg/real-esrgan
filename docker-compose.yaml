services:
  kkalssam-python-template:
    build:
      context: .
    image: trixie-slim:uv-nvm
    container_name: kkalssam-python-template
    working_dir: /root/kkalssam-python-template
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - .:/root/kkalssam-python-template
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: host
    ipc: host
    tty: true

  kkalssam-python-template-gpu:
    extends:
      service: kkalssam-python-template
    container_name: kkalssam-python-template-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu