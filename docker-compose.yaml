services:
  real-esrgan:
    image: trixie-slim:uv-nvm
    build:
      context: .
    container_name: real-esrgan
    volumes:
      - .:/root/real-esrgan
      - /tmp/.X11-unix:/tmp/.X11-unix
      - uv-cache:/root/.cache/uv
      - /home/airo-workstation/Downloads/k-dataset:/root/k-dataset:ro
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
    network_mode: host
    working_dir: /root/real-esrgan
    ipc: host
    stdin_open: true
    tty: true

  real-esrgan-gpu:
    container_name: real-esrgan-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    extends:
      service: real-esrgan
    profiles:
      - gpu

volumes:
  uv-cache:
